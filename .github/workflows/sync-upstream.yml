name: Sync upstream

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/p0deje/Maccy.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse upstream/master)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream has new commits."
          fi

      - name: Update master from upstream
        if: steps.check.outputs.changed == 'true'
        run: |
          git merge upstream/master --no-edit
          git push origin master

      - name: Try to merge tahoe-fixes
        if: steps.check.outputs.changed == 'true'
        id: merge
        continue-on-error: true
        run: |
          git checkout tahoe-fixes
          git rebase master
          git push origin tahoe-fixes --force-with-lease
          echo "rebased=true" >> "$GITHUB_OUTPUT"

      - name: Open PR on conflict
        if: steps.check.outputs.changed == 'true' && steps.merge.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Reset the failed rebase
          git rebase --abort || true

          # Create a conflict-resolution branch
          BRANCH="resolve-upstream-conflicts-$(date +%Y%m%d)"
          git checkout tahoe-fixes
          git checkout -b "$BRANCH"

          # Attempt merge with conflicts left in tree
          git merge master --no-commit --no-ff || true
          git add -A
          git commit -m "Merge upstream master for conflict resolution" || true
          git push origin "$BRANCH"

          # Open or update a PR
          gh pr create \
            --base tahoe-fixes \
            --head "$BRANCH" \
            --title "Resolve upstream conflicts (auto-generated)" \
            --body "$(cat <<'BODY'
          ## Upstream sync conflict

          The daily upstream sync detected conflicts between `tahoe-fixes` and the latest `master` from `p0deje/Maccy`.

          This PR contains a merge commit with conflict markers. Please resolve manually, then rebase `tahoe-fixes` onto the result.

          Once resolved, the daily sync will resume auto-rebasing without conflicts.

          ---

          *Generated by the sync-upstream workflow.*
          BODY
          )" \
            --label "upstream-sync" 2>/dev/null || \
          gh pr list --base tahoe-fixes --head "$BRANCH" --json number --jq '.[0].number' | \
          xargs -I{} gh pr edit {} --body "Updated $(date -u +%Y-%m-%dT%H:%M:%SZ)"

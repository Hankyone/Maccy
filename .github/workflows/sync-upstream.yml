name: Sync upstream

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/p0deje/Maccy.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for upstream changes
        id: check
        run: |
          # Find the merge base (last upstream commit we're based on)
          BASE=$(git merge-base HEAD upstream/master)
          if [ "$BASE" = "$(git rev-parse upstream/master)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream has new commits."
          fi

      - name: Rebase master onto upstream
        if: steps.check.outputs.changed == 'true'
        id: rebase
        continue-on-error: true
        run: |
          git rebase upstream/master
          git push origin master --force-with-lease
          echo "rebased=true" >> "$GITHUB_OUTPUT"

      - name: Open PR on conflict
        if: steps.check.outputs.changed == 'true' && steps.rebase.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Reset the failed rebase
          git rebase --abort || true

          # Create a conflict-resolution branch from current master
          BRANCH="resolve-upstream-conflicts-$(date +%Y%m%d)"
          git checkout -b "$BRANCH"

          # Attempt merge with conflicts left in tree for manual resolution
          git merge upstream/master --no-commit --no-ff || true
          git add -A
          git commit -m "Merge upstream master for conflict resolution" || true
          git push origin "$BRANCH"

          # Open a PR from the conflict branch into master
          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "Resolve upstream conflicts (auto-generated)" \
            --body "## Upstream sync conflict

          The daily upstream sync detected conflicts when rebasing \`master\` onto the latest \`p0deje/Maccy\` master.

          This PR contains a merge commit with conflict markers. Please resolve manually, then merge this PR into \`master\`.

          Once resolved, the daily sync will resume auto-rebasing without conflicts.

          ---

          *Generated by the sync-upstream workflow.*" \
            --label "upstream-sync" 2>/dev/null || true
